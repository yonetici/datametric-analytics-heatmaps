name: Deploy to WordPress.org SVN

# Publishes to the WordPress.org SVN repository when a GitHub release is published,
# or manually via the Actions tab (Run workflow). Requires the repository secrets
# WPORG_SVN_USERNAME and WPORG_SVN_PASSWORD (set in Settings -> Secrets and variables).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Single source of truth for the SVN tag: the "Stable tag" line in readme.txt.
      # This keeps the SVN tag (e.g. 1.0.0) in sync with what WordPress.org treats as stable,
      # regardless of how the workflow was triggered (release or manual dispatch).
      - name: Resolve version from readme.txt
        id: ver
        run: |
          VERSION="$(grep -m1 '^Stable tag:' datametric-analytics-heatmaps/readme.txt | sed 's/^Stable tag:[[:space:]]*//' | tr -d '[:space:]')"
          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: WordPress.org Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.WPORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WPORG_SVN_PASSWORD }}
          SLUG: datametric-analytics-heatmaps
          VERSION: ${{ steps.ver.outputs.version }}
          ASSETS_DIR: assets
          BUILD_DIR: datametric-analytics-heatmaps
